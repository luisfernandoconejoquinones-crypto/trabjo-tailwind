<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/output.css">
    <title>Destinos | Galería</title>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex items-center justify-center py-12">

    <section class="w-full max-w-6xl mx-auto px-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200/60 overflow-hidden flex flex-col">
                <div class="w-full aspect-[16/9] bg-gray-100">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=600" 
                         alt="Playa tropical al atardecer" 
                         class="w-full h-full object-cover">
                </div>
                <div class="p-5 text-center">
                    <p class="text-gray-600 text-base font-normal">
                        Playa tropical al atardecer
                    </p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200/60 overflow-hidden flex flex-col">
                <div class="w-full aspect-[16/9] bg-gray-100">
                    <img src="https://media.istockphoto.com/id/538600418/es/foto/r%C3%ADo-vltava-cruce-el-puente-charle-con-follaje-rojo.jpg?s=612x612&w=0&k=20&c=_rz_jOVVuK5Wcwompzc2ollkgUcAOzH0_rrpIpO9tL4=" 
                         alt="Europa" 
                         class="w-full h-full object-cover">
                </div>
                <div class="p-5 text-center">
                    <p class="text-gray-600 text-base font-normal">
                        Europa
                    </p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200/60 overflow-hidden flex flex-col">
                <div class="w-full aspect-[16/9] bg-gray-100">
                    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=600" 
                         alt="Lago" 
                         class="w-full h-full object-cover">
                </div>
                <div class="p-5 text-center">
                    <p class="text-gray-600 text-base font-normal">
                        lago
                    </p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200/60 overflow-hidden flex flex-col">
                <div class="w-full aspect-[16/9] bg-gray-100">
                    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=600" 
                         alt="Parque Natural" 
                         class="w-full h-full object-cover">
                </div>
                <div class="p-5 text-center">
                    <p class="text-gray-600 text-base font-normal">
                        parque natural
                    </p>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
